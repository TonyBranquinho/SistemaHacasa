<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Ponto Certo</title>
</head>

<body>
    <form action="" method="post" autocomplete="off" class="form">
        <fieldset class="formulario-field">
            <legend class="formulario-legend">Cadastre-se</legend>

            <label class="formulario-label" for="usuario">usuario</label>
            <input class="formulario-input" type="text" name="usuario" id="usuario" required>

            <label class="formulario-label" for="email">email</label>
            <input class="formulario-input" type="email" name="email" id="email" required>

            <label class="formulario-label" for="senha">senha</label>
            <input class="formulario-input" type="password" name="senha" id="password" required>

            <nav class="formulario-nav">
                <button class="form___submit" type="submit">cadastre-se</button>
                <div class="formulario-div">
                    <p>Ja possui cadastro?</p>
                    <a class="jaPossuiCadastro-login" href="index.html">Faça login</a>
                </div>
            </nav>
        </fieldset>
    </form>
</body>
</html>
