<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, inicial-scale=1.0" />
  <title>Login Ponto Certo</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <form id="loginForm" action="" method="post" autocomplete="off" class="form">
    <fieldset class="formulario-field">
      <legend class="formulario-legend">Login</legend>

      <label class="formulario-label" for="usuario">Usuario</label>
      <input class="formulario-input" type="text" name="usuario" id="usuario" required>

      <label class="formulario-label" for="senha">Senha</label>
      <input class="formulario-input" type="password" name="senha" id="senha" required>

      <nav class="formulario-nav">
        <button class="formulario-submit" type="submit">Entrar</button>
        <div class="formulario-div">
          <a class="jaPossuiCadastro-login" href="cadastro.html">Quero me cadastrar</a>
          <a class="jaPossuiCadastro-login" href="recupera.html">Esqueçi a senha</a>
        </div>
      </nav>      
    </fieldset>
  </form>

  <script src="script.js"></script>
</body>
</html>
