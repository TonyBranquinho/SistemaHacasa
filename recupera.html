<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recupera senha</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form id="recuperaForm" action="" method="post" autocomplete="off" class="form">
        <fieldset class="formulario-field">
            <legend class="formulario-legend">Recupere sua senha</legend>

            <label class="formulario-label" for="email">Email</label>
            <input class="formulario-input" type="email" name="email" id="email" required>

            <label class="formulario-label" for="senha">Senha</label>
            <input class="formulario-input" type="senha" name="senha" id="senha" required>

            <nav class="formulario-nav">
                <button class="formulario-submit" type="submit">Recuperar</button>
                <div class="formulario-div">
                    <p></p>
                    <a class="jaPossuiCadastro-login" href="index.html">Voltar para login</a>
                </div>
            </nav>
        </fieldset>
    </form>
    <script src="script.js"></script>
    
</body>
</html>
